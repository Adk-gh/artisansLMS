<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Manage Classes</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* JS-toggled display hooks — cannot be replaced by Bootstrap utilities */
        .class-row-wrap.hidden { display: none; }
        .no-results-row        { display: none; }
        .no-results-row.show   { display: table-row; }

        /* Chevron flip on collapse open */
        .collapse-toggle[aria-expanded="true"] .fa-chevron-down { transform: rotate(180deg); }
    </style>
</head>
<body>

<div id="sidebar-placeholder"></div>
<div id="content">
    <div id="header-placeholder"></div>

    <main class="p-4 p-md-5">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h4 class="fw-bold m-0 text-dark">Class Management</h4>
                <p class="text-muted small mb-0">Create and manage class sections by course.</p>
            </div>
            <button class="btn btn-dark d-inline-flex align-items-center gap-2 px-4 py-2 fw-semibold rounded-3 shadow-sm"
                    data-bs-toggle="modal" data-bs-target="#addClassModal">
                <i class="fas fa-plus"></i>Create New Class
            </button>
        </div>

        <!-- Search & Filter Bar -->
        <div class="bg-white border rounded-4 p-3 mb-4 d-flex align-items-center gap-2 flex-wrap">
            <div class="position-relative flex-grow-1" style="min-width:200px;">
                <i class="fas fa-search position-absolute top-50 translate-middle-y ms-3 text-secondary"
                   style="font-size:.8rem;pointer-events:none;"></i>
                <input type="text" class="form-control form-control-sm bg-light border-0 ps-4 rounded-3"
                       id="classSearch" placeholder="Search course name or code…">
            </div>
            <select class="form-select form-select-sm bg-light border-0 rounded-3 fw-semibold text-secondary w-auto"
                    id="classDeptFilter" title="Filter by Department">
                <option value="">All Departments</option>
            </select>
            <select class="form-select form-select-sm bg-light border-0 rounded-3 fw-semibold text-secondary w-auto"
                    id="classTermFilter" title="Filter by Term">
                <option value="">All Terms</option>
            </select>
            <select class="form-select form-select-sm bg-light border-0 rounded-3 fw-semibold text-secondary w-auto"
                    id="classCapFilter" title="Filter by Capacity">
                <option value="">All Capacity</option>
                <option value="open">Has Open Slots</option>
                <option value="full">Full</option>
            </select>
            <div class="ms-auto small fw-bold text-secondary text-nowrap" id="classCount">
                Showing <span id="classCountNum" class="text-info">0</span> sections
            </div>
        </div>

        <!-- Main Table -->
        <div class="shadow-sm border-0 bg-white rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table align-middle mb-0 table-hover">
                    <thead class="bg-light text-muted small">
                        <tr>
                            <th class="ps-4">Course</th>
                            <th>Section / Term</th>
                            <th>Instructor</th>
                            <th>Capacity</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="classBody">
                        <tr>
                            <td colspan="5" class="text-center py-5 text-muted small">Loading Class Data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- ── Add Class Modal ── -->
<div class="modal fade" id="addClassModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="addClassForm" class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white border-0 py-3 px-4">
                <h5 class="modal-title fw-bold">
                    <i class="fas fa-calendar-plus me-2 text-info"></i>Schedule New Class
                </h5>
                <button type="button" title="Close" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Course Catalog</label>
                    <select id="add_course_id" class="form-select bg-light border-0" required>
                        <option value="">Loading Courses...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Assign Instructor</label>
                    <select id="add_instructor_id" class="form-select bg-light border-0" required>
                        <option value="">Loading Faculty...</option>
                    </select>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Semester</label>
                        <select id="add_semester" class="form-select bg-light border-0" required>
                            <option value="1st Semester">1st Semester</option>
                            <option value="2nd Semester">2nd Semester</option>
                            <option value="Summer">Summer</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Academic Year</label>
                        <input type="number" id="add_year" class="form-control bg-light border-0" value="2026" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Max Student Capacity</label>
                    <input type="number" id="add_capacity" class="form-control bg-light border-0" value="40" required>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="submit" class="btn btn-dark w-100 py-3 shadow fw-bold rounded-3">
                    Open Class Section
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ── Edit Class Modal ── -->
<div class="modal fade" id="editClassModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="editClassForm" class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white border-0 py-3 px-4">
                <h5 class="modal-title fw-bold">
                    <i class="fas fa-edit me-2"></i>Edit Class Details
                </h5>
                <button type="button" title="Close" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="edit_class_id">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Course Catalog</label>
                    <select id="edit_course_id" class="form-select bg-light border-0" required>
                        <option value="">Loading Courses...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Assign Instructor</label>
                    <select id="edit_instructor_id" class="form-select bg-light border-0" required>
                        <option value="">Loading Faculty...</option>
                    </select>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Semester</label>
                        <select id="edit_semester" class="form-select bg-light border-0" required>
                            <option value="1st Semester">1st Semester</option>
                            <option value="2nd Semester">2nd Semester</option>
                            <option value="Summer">Summer</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Academic Year</label>
                        <input type="number" id="edit_year" class="form-control bg-light border-0" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Max Student Capacity</label>
                    <input type="number" id="edit_capacity" class="form-control bg-light border-0" required>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="submit" class="btn btn-primary w-100 py-3 shadow fw-bold rounded-3">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/js/modules/classes.js"></script>

</body>
</html>
