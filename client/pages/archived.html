<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Absolute necessities for sidebar layout and custom logic states */
        body { font-family: 'Sora', sans-serif; background-color: #f8fafc; }
        @media (min-width: 768px) { #content { margin-left: 260px !important; transition: margin-left .28s; } }
        
        /* Keep these for JS to target the active states without inline styles */
        .arch-tab.active { background-color: #0f172a !important; color: #fff !important; }
        .arch-filter-chip.factive { background-color: #0f172a !important; color: #fff !important; border-color: #0f172a !important; }
        
        /* Hide scrollbar utility */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <div id="content" class="min-vh-100">
        <div id="header-placeholder"></div>

        <main class="p-3 p-md-5">

            <div class="mb-4">
                <h4 class="fw-bold text-dark mb-1">System Archives</h4>
                <p class="text-muted small">Restore or permanently delete archived records from the system.</p>
            </div>

            <div class="d-flex bg-white border rounded-3 mb-4 overflow-auto no-scrollbar shadow-sm" style="max-width: max-content;">
                <button class="btn btn-link text-decoration-none border-0 py-2 px-3 arch-tab text-secondary fw-bold small d-flex align-items-center gap-2" data-tab="classes" onclick="switchTab('classes')">
                    <i class="fas fa-door-open"></i> Classes <span class="badge bg-light text-dark border tab-count">0</span>
                </button>
                <button class="btn btn-link text-decoration-none border-0 py-2 px-3 arch-tab text-secondary fw-bold small d-flex align-items-center gap-2" data-tab="students" onclick="switchTab('students')">
                    <i class="fas fa-user-graduate"></i> Students <span class="badge bg-light text-dark border tab-count">0</span>
                </button>
                <button class="btn btn-link text-decoration-none border-0 py-2 px-3 arch-tab text-secondary fw-bold small d-flex align-items-center gap-2" data-tab="courses" onclick="switchTab('courses')">
                    <i class="fas fa-layer-group"></i> Courses <span class="badge bg-light text-dark border tab-count">0</span>
                </button>
                <button class="btn btn-link text-decoration-none border-0 py-2 px-3 arch-tab text-secondary fw-bold small d-flex align-items-center gap-2" data-tab="instructors" onclick="switchTab('instructors')">
                    <i class="fas fa-user-tie"></i> Instructors <span class="badge bg-light text-dark border tab-count">0</span>
                </button>
                <button class="btn btn-link text-decoration-none border-0 py-2 px-3 arch-tab text-secondary fw-bold small d-flex align-items-center gap-2" data-tab="enrollments" onclick="switchTab('enrollments')">
                    <i class="fas fa-link"></i> Enrollments <span class="badge bg-light text-dark border tab-count">0</span>
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-3 mb-4 bg-white" id="archFilterBar">
                <div class="card-body p-3 d-flex flex-column flex-md-row align-items-center gap-3">
                    
                    <div class="position-relative flex-grow-1 w-100" style="max-width: 400px;">
                        <i class="fas fa-search position-absolute text-muted" style="left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.8rem;"></i>
                        <input type="text" id="archSearch" class="form-control ps-5 rounded-2 border-light-subtle bg-light small" placeholder="Search records…">
                    </div>

                    <div class="d-flex align-items-center gap-2 overflow-auto no-scrollbar w-100">
                        <span class="btn btn-sm btn-light border rounded-pill px-3 fw-bold small text-secondary arch-filter-chip factive" onclick="setDateFilter(this,'all')">All Time</span>
                        <span class="btn btn-sm btn-light border rounded-pill px-3 fw-bold small text-secondary arch-filter-chip" onclick="setDateFilter(this,'today')">Today</span>
                        <span class="btn btn-sm btn-light border rounded-pill px-3 fw-bold small text-secondary arch-filter-chip" onclick="setDateFilter(this,'week')">This Week</span>
                        <span class="btn btn-sm btn-light border rounded-pill px-3 fw-bold small text-secondary arch-filter-chip" onclick="setDateFilter(this,'month')">This Month</span>
                        <span class="ms-auto text-muted small fw-bold text-nowrap ps-2" id="archResultCount">0 records</span>
                    </div>

                </div>
            </div>

            <div id="tableContainer" class="bg-white border rounded-4 shadow-sm overflow-hidden">
                <div class="text-center py-5 text-muted fw-bold">
                    <div class="spinner-border spinner-border-sm mb-2 text-primary"></div><br>
                    Loading archives...
                </div>
            </div>

        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Sidebar and Header injection logic
            $("#sidebar-placeholder").load("../components/sidebar.html");
            $("#header-placeholder").load("../components/header.html", function(res, status) {
                if (status !== 'error' && typeof initHeader === 'function') initHeader();
            });
        });
    </script>
    
    <script src="../assets/js/modules/archived.js"></script>
</body>
</html>
