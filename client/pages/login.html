<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5" style="font-family: 'Inter', sans-serif;">

    <div class="card border-0 shadow-lg rounded-4 w-100 mx-3" style="max-width: 450px;">
        <div class="card-body p-4 p-md-5">
            
            <div class="text-center mb-4">
                <div class="mb-3">
                    <img src="../assets/img/logo.png" alt="Artisans LMS Logo" class="img-fluid" style="max-width: 70px;">
                </div>
                <h3 class="fw-bold text-dark mb-1">ARTISANS | LMS</h3>
                <p class="text-muted small mb-0">Sign in to your account to continue</p>
            </div>

            <div id="alertMsg" class="alert d-none py-2 small text-center rounded-3 fw-medium"></div>

            <form id="loginForm">
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold text-uppercase mb-1">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control py-2" required placeholder="name@example.com">
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold text-uppercase mb-1">Password</label>
                    <input type="password" id="loginPassword" class="form-control py-2" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-3 shadow-sm mt-2" id="loginBtn">
                    Sign In <i class="fas fa-arrow-right ms-2"></i>
                </button>

                <div class="text-center mt-4 pt-3 border-top">
                    <span class="text-muted small">Don't have a student account?</span>
                    <a href="register.html" class="text-decoration-none fw-bold text-primary small ms-1">Sign Up</a>
                </div>
            </form>
            
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/modules/auth.js"></script>
</body>
</html>
