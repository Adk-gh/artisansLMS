<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | My Grades</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Sora', sans-serif; background-color: #f8fafc; }
        @media (min-width: 768px) { #content { margin-left: 260px !important; } }
        
        .grade-card { border-radius: 16px; border: 1px solid #e2e8f0; background: white; transition: 0.2s; height: 100%; display: flex; flex-direction: column; }
        .grade-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
        
        .score-ring {
            width: 64px; height: 64px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 800; border: 4px solid;
        }
        .ring-excellent { border-color: #22c55e; color: #15803d; background: #f0fdf4; }
        .ring-good { border-color: #0ea5e9; color: #0369a1; background: #f0f9ff; }
        .ring-average { border-color: #f59e0b; color: #b45309; background: #fffbeb; }
        .ring-poor { border-color: #ef4444; color: #b91c1c; background: #fef2f2; }
        .ring-none { border-color: #cbd5e1; color: #94a3b8; background: #f8fafc; }

        .grade-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .grade-item:last-child { border-bottom: none; }
        
        .summary-strip { background: linear-gradient(135deg, #0ea5e9, #0284c7); border-radius: 16px; padding: 24px; color: white; }
    </style>
</head>
<body>

    <div class="d-flex min-vh-100">
        <div id="sidebar-placeholder"></div>

        <div id="content" class="flex-grow-1 w-100">
            <div id="header-placeholder"></div>

            <main class="container-fluid p-3 p-md-4 p-lg-5">
                <div class="summary-strip d-flex flex-wrap justify-content-between align-items-center mb-5 shadow-sm">
                    <div>
                        <h4 class="fw-bold mb-1">Performance Overview</h4>
                        <p class="mb-0 opacity-75 small">Real-time tracking of your academic standing.</p>
                    </div>
                    <div class="d-flex gap-4 text-center">
                        <div>
                            <div class="fs-2 fw-800" id="overallAvg">0%</div>
                            <div class="small text-uppercase opacity-75 fw-bold" style="font-size: 0.6rem;">Overall Avg</div>
                        </div>
                        <div class="border-start border-white border-opacity-25 ps-4">
                            <div class="fs-2 fw-800" id="totalClasses">0</div>
                            <div class="small text-uppercase opacity-75 fw-bold" style="font-size: 0.6rem;">Classes</div>
                        </div>
                    </div>
                </div>

                <div class="row g-4" id="gradesGrid">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="fw-bold" id="modalTitle">Course Details</h5>
                    <button type="button" title="Close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/artisansLMS/client/assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchGrades();

            function fetchGrades() {
    console.log("Attempting to fetch grades...");
    fetch('/artisansLMS/backend/endpoints/my_grades.php')
        .then(res => {
            console.log("Response status:", res.status);
            return res.json();
        })
        .then(data => {
            console.log("Data received:", data); // Check if data.status is success
            if (data.status === 'success') {
                document.getElementById('overallAvg').textContent = data.summary.overall_avg + '%';
                document.getElementById('totalClasses').textContent = data.summary.total_classes;
                renderGrid(data.classes);
            } else {
                document.getElementById('gradesGrid').innerHTML = `<div class="alert alert-warning">${data.message}</div>`;
            }
        })
        .catch(err => {
            console.error('Fetch error:', err);
            document.getElementById('gradesGrid').innerHTML = `<div class="alert alert-danger">Critical Error: ${err.message}</div>`;
        });
}
            function getRingClass(score) {
                if (score === null) return 'ring-none';
                if (score >= 90) return 'ring-excellent';
                if (score >= 75) return 'ring-good';
                if (score >= 60) return 'ring-average';
                return 'ring-poor';
            }

            function renderGrid(classes) {
                const grid = document.getElementById('gradesGrid');
                if (classes.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">Not enrolled in any classes yet.</div>';
                    return;
                }

                grid.innerHTML = classes.map((c, idx) => {
                    const score = c.averages.combined;
                    const ring = getRingClass(score);
                    
                    return `
                        <div class="col-12 col-xl-6">
                            <div class="grade-card shadow-sm p-4">
                                <div class="d-flex gap-3 align-items-center mb-3">
                                    <div class="score-ring ${ring}">
                                        <span class="fs-5">${score ?? '—'}</span>
                                        ${score ? '<span style="font-size:0.5rem">%</span>' : ''}
                                    </div>
                                    <div class="overflow-hidden">
                                        <span class="badge bg-primary-subtle text-primary mb-1">${c.info.course_code}</span>
                                        <h6 class="fw-bold text-dark mb-0 text-truncate">${c.info.course_name}</h6>
                                        <small class="text-muted">Prof. ${c.info.last_name}</small>
                                    </div>
                                </div>
                                <div class="mt-auto d-flex justify-content-between align-items-center pt-3 border-top">
                                    <div class="small text-muted">
                                        <i class="fas fa-file-alt me-1 text-info"></i> ${c.assignments.length} Tasks
                                        <i class="fas fa-brain ms-2 me-1 text-primary"></i> ${c.quizzes.length} Quizzes
                                    </div>
                                    <button class="btn btn-sm btn-dark rounded-pill px-3 fw-bold" onclick='viewDetails(${JSON.stringify(c)})'>Details</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.viewDetails = (c) => {
                document.getElementById('modalTitle').textContent = c.info.course_name;
                const body = document.getElementById('modalBody');
                
                let html = `<div class="mb-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-file-alt text-info me-2"></i> Assignments</h6>`;
                
                if (c.assignments.length === 0) html += `<p class="text-muted small">No assignments yet.</p>`;
                else {
                    html += c.assignments.map(a => `
                        <div class="grade-item">
                            <div>
                                <div class="fw-bold small text-dark">${a.title}</div>
                                <div class="text-muted" style="font-size:0.7rem">${a.grade ? 'Graded' : 'Pending'}</div>
                            </div>
                            <span class="badge ${a.grade ? 'bg-primary' : 'bg-light text-muted border'}">${a.grade ?? '—'}</span>
                        </div>
                    `).join('');
                }

                html += `</div><div><h6 class="fw-bold mb-3"><i class="fas fa-brain text-primary me-2"></i> Quizzes</h6>`;
                
                if (c.quizzes.length === 0) html += `<p class="text-muted small">No quizzes yet.</p>`;
                else {
                    html += c.quizzes.map(q => `
                        <div class="grade-item">
                            <div class="fw-bold small text-dark">${q.title}</div>
                            <span class="badge ${q.pct ? 'bg-success' : 'bg-light text-muted border'}">${q.pct ? q.pct+'%' : '—'}</span>
                        </div>
                    `).join('');
                }

                body.innerHTML = html + `</div>`;
                new bootstrap.Modal(document.getElementById('detailsModal')).show();
            };
        });
    </script>
</body>
</html>
