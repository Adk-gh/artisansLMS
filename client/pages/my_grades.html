<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | My Grades</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Essential Layout & Typography */
        body { font-family: 'Sora', sans-serif; background-color: #f8fafc; }
        @media (min-width: 768px) { #content { margin-left: 260px !important; transition: margin-left .28s; } }
        
        /* Card Hover Effect */
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important; }

        /* ── Matching Analytics Player Card Style ── */
        .player-card { 
            background: #0f172a; 
            color: white; 
            border-radius: 20px; 
            overflow: hidden; 
            position: relative; 
        }
        .player-card::after { 
            content: ''; 
            position: absolute; 
            top: 0; right: 0; 
            width: 300px; height: 100%; 
            background: url('https://www.transparenttextures.com/patterns/cubes.png'); 
            opacity: .08; 
            pointer-events: none;
        }
        /* Vibrant accent color for numbers matching analytics */
        .stat-highlight { color: #0ea5e9; } 
    </style>
</head>
<body>

    <div class="d-flex min-vh-100">
        
        <div id="sidebar-container"></div>

        <div id="content" class="flex-grow-1 w-100">
            
            <div id="header-container"></div>

            <main class="container-fluid p-3 p-md-4 p-lg-5">
                
                <div class="player-card mb-5 p-4 p-md-5 shadow-lg">
                    <div class="d-flex flex-wrap justify-content-between align-items-center position-relative" style="z-index: 1;">
                        <div>
                            <h4 class="fw-bold mb-1">Performance Overview</h4>
                            <div class="text-info small fw-bold mt-2">
                                <i class="fas fa-chart-line me-1"></i> Real-time tracking of your academic standing.
                            </div>
                        </div>
                        <div class="d-flex gap-4 text-center mt-4 mt-md-0">
                            <div>
                                <div class="fs-2 fw-bolder stat-highlight" id="overallAvg">0%</div>
                                <div class="small text-uppercase text-light opacity-75 fw-bold mt-1" style="letter-spacing: 0.5px;">Overall Avg</div>
                            </div>
                            <div class="border-start border-secondary ps-4">
                                <div class="fs-2 fw-bolder stat-highlight" id="totalClasses">0</div>
                                <div class="small text-uppercase text-light opacity-75 fw-bold mt-1" style="letter-spacing: 0.5px;">Classes</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4" id="gradesGrid">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <div class="text-muted small fw-bold mt-2">Loading Grades...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="fw-bold" id="modalTitle">Course Details</h5>
                    <button type="button" title="Close" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/artisansLMS/client/assets/js/app.js"></script>
    <script src="../assets/js/modules/my_grades.js"></script>
</body>
</html>
