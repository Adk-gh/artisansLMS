<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5" style="font-family: 'Inter', sans-serif;">

    <div class="card border-0 shadow-lg rounded-4 w-100 mx-3" style="max-width: 600px;">
        <div class="card-body p-4 p-md-5">
            
            <div class="text-center mb-4">
                <div class="mb-3">
                    <img src="/artisansLMS/client/assets/img/logo.png" alt="Artisans LMS Logo" class="img-fluid" style="max-width: 70px;">
                </div>
                <h3 class="fw-bold text-dark mb-1">Join ARTISANS | LMS</h3>
                <p class="text-muted small mb-0">Register for a new student account</p>
            </div>

            <div id="alertMsg" class="alert d-none py-2 small text-center rounded-3 fw-medium"></div>

            <form id="registerForm">
                
                <div class="row g-3 mb-3">
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold text-secondary small mb-1">First Name</label>
                        <input type="text" id="regFirstName" class="form-control py-2" required placeholder="Juan">
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold text-secondary small mb-1">Last Name</label>
                        <input type="text" id="regLastName" class="form-control py-2" required placeholder="Dela Cruz">
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-sm-6">
                        <label for="regDOB" class="form-label fw-semibold text-secondary small mb-1">Date of Birth</label>
                        <input type="date" id="regDOB" class="form-control py-2" required title="Enter your date of birth" placeholder="MM/DD/YYYY">
                    </div>
                    <div class="col-sm-6">
                        <label for="regGender" class="form-label fw-semibold text-secondary small mb-1">Gender</label>
                        <select id="regGender" class="form-select py-2" required title="Select your gender">
                            <option value="" disabled selected>Select</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary small mb-1">Email Address</label>
                    <input type="email" id="regEmail" class="form-control py-2" required placeholder="name@example.com">
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold text-secondary small mb-1">Password</label>
                        <input type="password" id="regPassword" class="form-control py-2" required placeholder="••••••••">
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold text-secondary small mb-1">Confirm Password</label>
                        <input type="password" id="regConfirmPassword" class="form-control py-2" required placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-3 shadow-sm" id="regBtn">
                    Create Account <i class="fas fa-user-plus ms-2"></i>
                </button>

                <div class="text-center mt-4 pt-3 border-top">
                    <span class="text-muted small">Already have an account?</span>
                    <a href="/artisansLMS/client/pages/login.html" class="text-decoration-none fw-bold text-primary small ms-1">Sign In</a>
                </div>
            </form>
            
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/artisansLMS/client/assets/js/modules/auth.js"></script>
</body>
</html>
